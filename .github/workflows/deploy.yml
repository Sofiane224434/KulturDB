name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 2222
          script: |
            set -e

            APP_DIR=~/apps/kulturdb
            LEGACY_APP_DIR=~/apps/cinetech
            REPO_URL=https://github.com/${{ github.repository }}.git

            docker network inspect web >/dev/null 2>&1 || docker network create web

            mkdir -p $APP_DIR
            cd $APP_DIR

            if [ -d ".git" ]; then
              git fetch origin
              git reset --hard origin/main
              git clean -fd -e .env
            else
              git init
              git remote add origin $REPO_URL
              git fetch origin main
              git checkout -B main origin/main
            fi

            test -f .env

            # Auto-initialiser les variables auth critiques si elles sont absentes
            if ! grep -q '^AUTH_JWT_SECRET=' .env; then
              JWT_SECRET=$(openssl rand -hex 48 2>/dev/null || cat /proc/sys/kernel/random/uuid | tr -d '-')
              echo "AUTH_JWT_SECRET=$JWT_SECRET" >> .env
              echo "AUTH_JWT_SECRET ajoute automatiquement dans .env"
            fi

            if ! grep -q '^AUTH_SESSION_SECRET=' .env; then
              SESSION_SECRET=$(openssl rand -hex 48 2>/dev/null || cat /proc/sys/kernel/random/uuid | tr -d '-')
              echo "AUTH_SESSION_SECRET=$SESSION_SECRET" >> .env
              echo "AUTH_SESSION_SECRET ajoute automatiquement dans .env"
            fi

            if ! grep -q '^FRONTEND_BASE_URL=' .env; then
              echo "FRONTEND_BASE_URL=https://moviedb.azim404.com" >> .env
            fi

            if ! grep -q '^AUTH_BASE_URL=' .env; then
              echo "AUTH_BASE_URL=https://moviedb.azim404.com" >> .env
            fi

            # Coupe proprement l'ancien stack cinetech si encore present apres rebrand.
            if [ -d "$LEGACY_APP_DIR" ] && [ "$LEGACY_APP_DIR" != "$APP_DIR" ]; then
              if [ -f "$LEGACY_APP_DIR/docker-compose.yml" ] || [ -f "$LEGACY_APP_DIR/docker-compose.yaml" ]; then
                cd "$LEGACY_APP_DIR"
                COMPOSE_PROJECT_NAME=cinetech docker compose down || true
                cd "$APP_DIR"
              fi
            fi

            COMPOSE_PROJECT_NAME=kulturdb docker compose down || true

            # Garde-fou: si 3003 est occupe par un conteneur inattendu, on echoue avec un message clair.
            PORT_OWNER=$(docker ps --filter "publish=127.0.0.1:3003" --format '{{.ID}} {{.Names}}' | head -n1 || true)
            if [ -n "$PORT_OWNER" ]; then
              echo "Le port 127.0.0.1:3003 est deja utilise: $PORT_OWNER"
              echo "Veuillez liberer ce port ou aligner le mapping Docker avant redeploiement."
              exit 1
            fi

            COMPOSE_PROJECT_NAME=kulturdb docker compose up -d --build
            docker image prune -f
