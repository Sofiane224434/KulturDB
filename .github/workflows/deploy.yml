name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 2222
          script: |
            set -e

            APP_DIR=~/apps/cinetech
            REPO_URL=https://github.com/${{ github.repository }}.git

            docker network inspect web >/dev/null 2>&1 || docker network create web

            mkdir -p $APP_DIR
            cd $APP_DIR

            if [ -d ".git" ]; then
              git fetch origin
              git reset --hard origin/main
              git clean -fd -e .env
            else
              git init
              git remote add origin $REPO_URL
              git fetch origin main
              git checkout -B main origin/main
            fi

            test -f .env

            # Auto-initialiser les variables auth critiques si elles sont absentes
            if ! grep -q '^AUTH_JWT_SECRET=' .env; then
              JWT_SECRET=$(openssl rand -hex 48 2>/dev/null || cat /proc/sys/kernel/random/uuid | tr -d '-')
              echo "AUTH_JWT_SECRET=$JWT_SECRET" >> .env
              echo "AUTH_JWT_SECRET ajoute automatiquement dans .env"
            fi

            if ! grep -q '^AUTH_SESSION_SECRET=' .env; then
              SESSION_SECRET=$(openssl rand -hex 48 2>/dev/null || cat /proc/sys/kernel/random/uuid | tr -d '-')
              echo "AUTH_SESSION_SECRET=$SESSION_SECRET" >> .env
              echo "AUTH_SESSION_SECRET ajoute automatiquement dans .env"
            fi

            if ! grep -q '^FRONTEND_BASE_URL=' .env; then
              echo "FRONTEND_BASE_URL=https://moviedb.azim404.com" >> .env
            fi

            if ! grep -q '^AUTH_BASE_URL=' .env; then
              echo "AUTH_BASE_URL=https://moviedb.azim404.com" >> .env
            fi

            docker compose down || true
            docker compose up -d --build
            docker image prune -f
