services:
  kulturdb:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_TMDB_API_KEY: ${VITE_TMDB_API_KEY:?VITE_TMDB_API_KEY is required}
        VITE_TMDB_BASE_URL: ${VITE_TMDB_BASE_URL:-https://api.themoviedb.org/3}
    container_name: kulturdb
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "127.0.0.1:3003:80"
    networks:
      - web

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: kulturdb-api
    restart: unless-stopped
    environment:
      AUTH_PORT: 4000
      AUTH_BASE_URL: ${AUTH_BASE_URL:-http://localhost:4000}
      FRONTEND_BASE_URL: ${FRONTEND_BASE_URL:-http://localhost:5173}
      AUTH_JWT_SECRET: ${AUTH_JWT_SECRET:?AUTH_JWT_SECRET is required}
      AUTH_JWT_EXPIRES_IN: ${AUTH_JWT_EXPIRES_IN:-7d}
      AUTH_SESSION_SECRET: ${AUTH_SESSION_SECRET:-change_me_in_production}
      BREVO_API_KEY: ${BREVO_API_KEY:-}
      BREVO_SENDER_EMAIL: ${BREVO_SENDER_EMAIL:-}
      BREVO_SENDER_NAME: ${BREVO_SENDER_NAME:-KulturDB}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_CALLBACK_URL: ${GOOGLE_CALLBACK_URL:-}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-}
      GITHUB_CALLBACK_URL: ${GITHUB_CALLBACK_URL:-}
    volumes:
      - ./backend/data:/app/data
    networks:
      - web

networks:
  web:
    external: true
